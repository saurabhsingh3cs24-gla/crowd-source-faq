name: Deploy CSFAQ to Production

on:
  workflow_dispatch:

env:
  INFISICAL_ENVIRONMENT: prod
  INFISICAL_SECRET_PATH: /

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CSFAQ_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CSFAQ_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 csfaq-deploy@${{ secrets.CSFAQ_HOST }} bash << 'DEPLOY'
            set -e

            cd /home/csfaq-prod/crowd-source-faq

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Authenticating with Infisical..."
            export INFISICAL_TOKEN=$(npx @infisical/cli@0.43.40 login \
              --method=universal-auth \
              --client-id="${{ secrets.INFISICAL_CLIENT_ID }}" \
              --client-secret="${{ secrets.INFISICAL_CLIENT_SECRET }}" \
              --silent \
              --plain)

            if [ -z "$INFISICAL_TOKEN" ]; then
              echo "Infisical authentication failed"
              exit 1
            fi

            echo "==> Writing backend .env from Infisical..."
            npx @infisical/cli@0.43.40 export \
              --token="$INFISICAL_TOKEN" \
              --projectId="${{ secrets.INFISICAL_PROJECT_ID }}" \
              --env="${{ env.INFISICAL_ENVIRONMENT }}" \
              --path="${{ env.INFISICAL_SECRET_PATH }}" \
              --format=dotenv > apps/backend/.env

            echo "==> Cleaning quotes from env file..."
            sed -i "s/='\(.*\)'/=\1/; s/=\"\(.*\)\"/=\1/" apps/backend/.env

            echo "==> Installing all workspace dependencies..."
            pnpm install --frozen-lockfile

            echo "==> Building frontend..."
            cd apps/frontend
            pnpm build
            cd ../..

            echo "==> Restarting csfaq service..."
            sudo systemctl restart csfaq.service

            echo "==> Reloading nginx..."
            sudo systemctl reload nginx

            echo "==> Waiting 5s for backend to boot..."
            sleep 5

            echo "==> Smoke test: GET /csfaq/api/health..."
            # v1.71 — Post-deploy smoke test. Hits the backend on its
            # local port (6767) so we test the actual process, not
            # just nginx routing. The /health endpoint reports db and
            # redis state — if either is broken, fail the deploy loudly
            # so it doesn't sit in a broken state for hours. Retries up
            # to 5 times with 3s sleep to handle slow boots.
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              HEALTH_JSON=$(curl -sS --max-time 5 http://127.0.0.1:6767/csfaq/api/health || echo "")
              if [ -z "$HEALTH_JSON" ]; then
                echo "Attempt $i: no response from backend, retrying in 3s..."
                sleep 3
                continue
              fi
              echo "Attempt $i response: $HEALTH_JSON"
              STATUS=$(echo "$HEALTH_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
              DB=$(echo "$HEALTH_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('db',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "ok" ] && [ "$DB" = "connected" ]; then
                HEALTH_OK=true
                break
              fi
              echo "Attempt $i: status=$STATUS db=$DB — not healthy, retrying in 3s..."
              sleep 3
            done

            if [ "$HEALTH_OK" != "true" ]; then
              echo "==> SMOKE TEST FAILED after 5 attempts."
              echo "Last response: $HEALTH_JSON"
              echo "Recent backend logs:"
              sudo journalctl -u csfaq.service --since "2 minutes ago" --no-pager | tail -50
              exit 1
            fi

            echo "==> Smoke test passed."
            echo "==> Deployment complete."
          DEPLOY