# ═══════════════════════════════════════════════════════════════════════════════
#  Yaksha FAQ Portal — GitHub Pages deployment
#
#  Builds the Vite SPA, post-processes the artifacts for Pages (relative
#  base path + preview-only banner), and deploys apps/frontend/dist/ to
#  GitHub Pages.
#
#  Replaces the default "Deploy from a branch" Pages setting that was
#  failing because the repo root has no index.html.
#
#  The actual production deployment still happens via .github/workflows/
#  build-production.yml (Docker + VPS) — this Pages deploy is for the
#  https://vicharanashala.github.io/crowd-source-faq/ preview URL only.
#
#  Triggers:
#    • Push to main (auto deploy)
#    • Manual workflow_dispatch
#
#  Note: The deployed site is frontend-only. The backend API at
#  samagama.in/csfaq/api/* is NOT reachable from GitHub Pages (CORS /
#  network), so any feature that calls the backend will fail at runtime.
#  The injected banner makes this clear to visitors and points them at
#  the real app.
# ═══════════════════════════════════════════════════════════════════════════════

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-flight deploy if a new push comes in mid-build.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Vite SPA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter yaksha-faq-frontend build

      # ─── Post-process for GitHub Pages ─────────────────────────────────────
      # Vite is built with base:'/csfaq/' for the production Docker deploy.
      # For Pages (served at /<user>.github.io/<repo>/) the absolute base
      # path needs to become relative. This rewrites the absolute /csfaq/...
      # refs in index.html and the bundled JS/CSS so the SPA loads at any
      # sub-path. Backend API calls are repointed to the real production
      # backend at samagama.in/csfaq/api (which Pages can reach since
      # samagama.in allows CORS).
      - name: Rewrite absolute /csfaq/ paths to relative
        run: |
          find apps/frontend/dist -type f \
            \( -name "*.html" -o -name "*.js" -o -name "*.css" \) \
            -exec sed -i \
              -e 's|/csfaq/assets/|./assets/|g' \
              -e 's|/csfaq/api/|https://samagama.in/csfaq/api/|g' \
              -e 's|"/csfaq/|"./|g' \
              -e "s|'/csfaq/|'./|g" \
              {} +
          echo "--- rewritten index.html (first 30 lines) ---"
          head -30 apps/frontend/dist/index.html

      # SPA client-side routing needs a 404.html fallback so deep links
      # land on the SPA and React Router can take over. Copy index.html.
      - name: Create 404.html fallback
        run: |
          if [ -f apps/frontend/dist/index.html ]; then
            cp apps/frontend/dist/index.html apps/frontend/dist/404.html
          fi

      # Tell GitHub Pages to skip Jekyll processing of Vite's _next/
      # and other underscore-prefixed folders.
      - name: Add .nojekyll marker
        run: touch apps/frontend/dist/.nojekyll

      # Inject a preview-only banner so visitors know the deployed
      # site is a UI shell. Top-fixed, dismissable.
      - name: Inject preview-only banner
        run: python3 scripts/inject-pages-banner.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4